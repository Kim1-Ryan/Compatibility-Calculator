<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compatibility Calculator</title>
    <link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gelasio:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>

    <video autoplay muted loop playsinline id="background-video">
        <source src="vecteezy_loop-video-computer-binary-code-numbers-falling_36156625.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="content container">
      
        <h1 class="heading">How compatible are you?</h1>

        <p class="subheading">Maybe names are random. Maybe they aren't. You can use the ones your folks gave you, or the pet names/nicknames you and the other person call each other.</p>

        <div class="input">
                
            <div class="form-group">
                <label for="name1">Your Name:</label>
                <input type="text" name="name1" id="name1" value="" size="30" placeholder="" required>
            </div>
            
            <div class="form-group">
                <label for="name2">Their Name:</label>
                <input type="text" name="name2" id="name2" value="" size="30" placeholder="" required>
            </div>
            
        </div>
        
        <div class="submit">
                
            <div class="buttonContainer">
                <button class="btn" type="submit">Calculate</button>
            </div>
            
        </div>
            
    </div>

    <script src="index.js" charset="utf-8"></script>
</body>
</html>
